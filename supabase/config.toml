# Minimal Supabase CLI config. Replace project_id after `supabase link`.
# Full reference: https://supabase.com/docs/guides/cli/config
project_id = "shashanklearn"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false  # dev: skip email confirmation. Enable in prod.

# Google OAuth — set GOOGLE_CLIENT_ID / GOOGLE_SECRET in your environment.
[auth.external.google]
enabled = false  # flip to true once credentials are configured
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"

[storage]
enabled = true
file_size_limit = "200MiB"
