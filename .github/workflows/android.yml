name: Android APK

# Builds a self-contained (demo-mode) debug APK on GitHub's runners, which ship
# the Android SDK — so no local Android toolchain is needed. Download the APK
# from the run's Artifacts when it finishes.

on:
  push:
    branches: [android-apk, main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web (demo mode)
        run: npm run build
        env:
          VITE_DEMO_MODE: 'true'
          VITE_SUPABASE_URL: https://demo.supabase.co
          VITE_SUPABASE_ANON_KEY: demo-anon-key

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shashanklearn-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
